displayName: 'ExD v14: Exploración genérica inventario (schema normalizado)'
description: Explora Inventario por ocasión (regalo). Usuario mira sin comprar.
actions:
- agentUtterance:
    text: Tenemos una gran variedad, Marta. Para orientarte mejor, ¿para qué ocasión buscas? ¿Regalo, boda, funeral, decoración...?
- userUtterance:
    text: Para un regalo
- toolUse:
    tool: projects/floristeria-petal-digital/locations/europe-west1/agents/745375ba-ac7e-4eb8-b8a0-d742891f2aa4/tools/39e35fac-e018-4e98-b735-e45cb761bf5c
    action: consultarDatos
    inputActionParameters:
      ocasion: Regalo
      recurso: inventario
    outputActionParameters:
      '200':
        resultados:
        - Producto: Ramo de Peonías
          Especie: Peonías
          Color: Coral
          Tamano: M
          Precio: '35'
          Descripcion_Cantidad: 15 flores
          Ocasion: Regalo
        - Producto: Ramo de Girasoles
          Especie: Girasoles
          Color: Amarillo
          Tamano: M
          Precio: '20'
          Descripcion_Cantidad: 10 flores
          Ocasion: Regalo
        - Producto: Ramo de Gerberas
          Especie: Gerberas
          Color: Amarillo
          Tamano: M
          Precio: '18'
          Descripcion_Cantidad: 10 flores
          Ocasion: Regalo
        ok: true
        count: 3
        recurso: inventario
- agentUtterance:
    text: 'Para regalo te puedo ofrecer: Ramo de Peonías Coral — M (15 flores, 35€), Ramo de Girasoles Amarillo — M (10 flores, 20€), Ramo de Gerberas Amarillo — M (10 flores, 18€). ¿Algo te interesa?'
- userUtterance:
    text: No, solo quería ver qué teníais. Gracias.
- agentUtterance:
    text: ¡Perfecto! Si cambias de idea, aquí estamos. ¿Puedo ayudarte en algo más?
