playbookOutput:
  executionSummary: 'Petal pide inventario con especie=rosas + color=Azul. El backend relaja el color (fallback=color_relajado) y devuelve rosas en otros colores. Petal aplica el TONO cálido ante fallback: reconoce que no hay rosas azules, menciona alternativas e invita ("¿te enseño las más pedidas?") en vez de volcar la lista de golpe. Tras el "sí" del usuario, muestra las más habituales con APERTURA.'
