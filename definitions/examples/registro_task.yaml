# Examples para Playbook 'Registro_Task'.
# Schema: ver definitions/agent.yaml para el contexto agent/tool.
# El campo 'tool' en cada toolUse se inyecta en runtime por src/push_examples.py.

playbook: Registro_Task
examples:
- id: EX_REG_01
  displayName: Ex_Reg_01 — Particular con bajo (captura planta + slot filling letra)
  actions:
  - toolUse:
      action: consultarDatos
      inputActionParameters:
        recurso: agent_copy
        accion: leer
        clave: bienvenida_nuevo_cliente
      outputActionParameters:
        '200':
          ok: true
          recurso: agent_copy
          resultados:
          - valor: ¡Perfecto! Vamos a registrarte. Solo necesito unos datos.
  - agentUtterance:
      text: ¡Perfecto! Vamos a registrarte. Solo necesito unos datos. Para registrarte, necesito tu correo electronico.
  - userUtterance:
      text: zara.vidal@correo.com
  - agentUtterance:
      text: Entendido. ¿Cual es tu nombre?
  - userUtterance:
      text: Zara
  - agentUtterance:
      text: Zara. ¿Y tus apellidos?
  - userUtterance:
      text: Vidal
  - agentUtterance:
      text: Vidal, anotado. ¿Eres particular o empresa?
  - userUtterance:
      text: particular
  - agentUtterance:
      text: 'Perfecto. Indicame tu direccion completa: calle con numero, portal, planta y letra si aplica, codigo postal y ciudad.'
  - userUtterance:
      text: Paseo del Prado 22, Madrid
  - agentUtterance:
      text: Paseo del Prado 22, Madrid. ¿Tu codigo postal?
  - userUtterance:
      text: '28014'
  - agentUtterance:
      text: ¿Tu direccion incluye portal, planta o letra?
  - userUtterance:
      text: No, es un bajo
  - agentUtterance:
      text: Bajo, anotado. ¿Y la letra?
  - userUtterance:
      text: no, no hay letra
  - agentUtterance:
      text: Vale, sin letra. ¿Tienes un telefono de contacto? Facilita mucho las entregas.
  - userUtterance:
      text: '611222333'
  - agentUtterance:
      text: 'Antes de completar tu registro, revisa tus datos:

        • Nombre: Zara Vidal

        • Email: zara.vidal@correo.com

        • Tipo: particular

        • Direccion: Paseo del Prado 22, bajo, 28014 Madrid

        • Telefono: 611222333

        ¿Es todo correcto? Revisa especialmente la direccion — portal, planta y letra si aplica.'
  - userUtterance:
      text: Si, correcto
  - toolUse:
      action: consultarDatos
      inputActionParameters:
        recurso: registro
        accion: crear
        email: zara.vidal@correo.com
        nombre: Zara
        apellidos: Vidal
        tipo: particular
        calle: Paseo del Prado 22, bajo
        codigo_postal: '28014'
        ciudad: Madrid
        telefono: '611222333'
      outputActionParameters:
        '200':
          ok: true
          recurso: registro
          id_cliente: '155'
          nombre: Zara
          apellidos: Vidal
          email: zara.vidal@correo.com
          tipo: particular
          tier: Nuevo
  - agentUtterance:
      text: ¡Perfecto, Zara! Ya estas registrado/a. Continuamos con lo que me pedias.
  playbookOutput:
    actionParameters:
      id_cliente: '155'
      nombre_cliente: Zara
      apellidos: Vidal
      email: zara.vidal@correo.com
      tipo_cliente: particular
      Direccion_Habitual: Paseo del Prado 22, bajo, 28014 Madrid
      telefono: '611222333'
      recien_registrado: true
      estado_pago: Al dia
      sesion_cerrada: false
      razon_handoff: ''
