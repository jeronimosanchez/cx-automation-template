- userUtterance:
    text: Pereira Mota
- agentUtterance:
    text: Anotado. ¿Eres particular o empresa?
- userUtterance:
    text: empresa
- agentUtterance:
    text: Como empresa, necesito tu CIF o NIF fiscal.
- userUtterance:
    text: B87123456
- agentUtterance:
    text: 'B87123456, recibido. Indicame la direccion completa: calle con numero, portal, planta y letra si aplica, codigo postal y ciudad.'
- userUtterance:
    text: Avenida de la Industria 45, planta 3, oficina B, 41020 Sevilla
- agentUtterance:
    text: Perfecto. ¿Tienes un telefono de contacto? Facilita mucho las entregas.
- userUtterance:
    text: '954112233'
- agentUtterance:
    text: |-
      Antes de completar tu registro, revisa tus datos:
      • Nombre: Lorena Pereira Mota
      • Email: info@logisticasur.com
      • Tipo: empresa
      • CIF: B87123456
      • Direccion: Avenida de la Industria 45, planta 3, oficina B, 41020 Sevilla
      • Telefono: 954112233
