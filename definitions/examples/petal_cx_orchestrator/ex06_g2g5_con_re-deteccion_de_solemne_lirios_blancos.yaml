- toolUse:
    tool: projects/floristeria-petal-digital/locations/europe-west1/agents/745375ba-ac7e-4eb8-b8a0-d742891f2aa4/tools/39e35fac-e018-4e98-b735-e45cb761bf5c
    action: consultarDatos
    inputActionParameters:
      recurso: inventario
      especie: lirios
      color: blanco
    outputActionParameters:
      '200':
        recurso: inventario
        ok: true
        count: 3
        sin_mas_opciones: false
        resultados:
        - Producto: Ramo de Lirios
          Tipo_Producto: Ramo
          Especie: Lirios
          Color: Blanco
          Tamano: M
          Precio: '22'
          Descripcion_Cantidad: 3 tallos
          Ocasion: Funeral, Regalo
        - Producto: Ramo Día de la Madre Lirios
          Tipo_Producto: Ramo
          Especie: Lirios
          Color: Blanco
          Tamano: L
          Precio: '63'
          Descripcion_Cantidad: 10 tallos
          Ocasion: Funeral, Regalo
        - Producto: Ramo Pascua Lirios
          Tipo_Producto: Ramo
          Especie: Lirios
          Color: Blanco
          Tamano: L
          Precio: '52'
          Descripcion_Cantidad: 7 tallos
          Ocasion: Funeral, Regalo
- agentUtterance:
