- agentUtterance:
    text: Por supuesto. Te busco opciones apropiadas para la ocasión.
- playbookTransition:
    playbook: projects/floristeria-petal-digital/locations/europe-west1/agents/745375ba-ac7e-4eb8-b8a0-d742891f2aa4/playbooks/c3e31ae0-9389-45b5-9081-142f1ce0d3e0
playbookOutput:
  executionSummary: >
    Arranca neutro (consulta de precio, registro=estandar). En el turno 2 el
    usuario revela "velatorio" -> DETECCION de cambio: registro pasa a solemne
    a mitad de conversacion. El turno estandar (fresco, 🌸) contrasta con el
    solemne (pausado, sin emoji). Transfiere a Compra con registro=solemne.
  actionParameters:
    intencion: comprar Ramo de Lirios Blanco
    grupo_intent: G5
    registro: solemne
    producto: Ramo de Lirios Blanco
    ocasion_detectada: Funeral
conversationState: OUTPUT_STATE_OK
languageCode: es
