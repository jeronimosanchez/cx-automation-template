# Sprint 6 — QA Petal con runner real (test_qa_playbooks.py, 29 TCs).
#
# Sustituye el skeleton Promptfoo del Sprint 1 (archivado en qap/_archive/).
# Ejecuta los 29 TCs contra el Default Environment de CX (environments/-)
# y publica reportes HTML + TXT en GitHub Pages (rama gh-pages, ruta /qa/).
#
# Triggers:
# - workflow_dispatch: manual.
# - workflow_run: automático tras deploy exitoso a CX (post-merge a main).
#   Esto garantiza que QA testea la versión RECIÉN desplegada, no la anterior.
# - push a feature/** y PR a main: informativo, no bloquea merge.
#   NOTA: el QA de PRs testea la versión en producción, no los cambios del PR,
#   porque detectIntent llama al agente live y el PR aún no está desplegado.
#
# Auth: WIF (igual que deploy.yml). 0 SA keys.
# Concurrencia: 1 por rama, cancel-in-progress=true (no acumular QA stale).
#
# Decisión Sprint 6: el primer run lo dispara Jero manualmente desde Actions
# tras activar GitHub Pages (Fáse B documentada en docs/setup-qa.md).
#
# Referencia: EP-QA-02 (ACT_Backlog).
name: QA Petal

on:
  workflow_dispatch:
    inputs:
      runs:
        description: 'Número de runs por TC (default 1; usa 3 para detectar flakiness)'
        required: false
        default: '1'
        type: string
      agent:
        description: 'Agente objetivo: 1.0 (Default Env) o 1.1 (petal-1.1 env, tone refactor)'
        required: false
        default: '1.1'
        type: string
  workflow_run:
    workflows: ["Deploy to Petal CX"]
    types: [completed]
  push:
    branches: ['feature/**']
  pull_request:
    branches: [main]

concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write   # Necesario para push a gh-pages
  id-token: write   # WIF requiere id-token writable

jobs:
  # ---------------------------------------------------------------------------
  # Job 0: decide si QA debe correr.
  # Para workflow_run (post-deploy): solo si deploy fue exitoso Y tocó definitions/.
  # Para el resto (manual, PR, feature push): siempre corre.
  # ---------------------------------------------------------------------------
  check:
    name: Check if QA needed
    runs-on: ubuntu-latest
    outputs:
      run_qa: ${{ steps.decide.outputs.run_qa }}
    steps:
      - name: Decide
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "run_qa=false" >> "$GITHUB_OUTPUT"
              echo "Deploy failed — skipping QA"
              exit 0
            fi
            SHA="${{ github.event.workflow_run.head_sha }}"
            CHANGED=$(gh api "repos/${{ github.repository }}/commits/${SHA}" \
              --jq '[.files[].filename | select(startswith("definitions/"))] | length')
            if [ "$CHANGED" -gt 0 ]; then
              echo "run_qa=true" >> "$GITHUB_OUTPUT"
              echo "definitions/ changed (${CHANGED} files) — running QA"
            else
              echo "run_qa=false" >> "$GITHUB_OUTPUT"
              echo "No definitions/ changes — skipping QA"
            fi
          else
            echo "run_qa=true" >> "$GITHUB_OUTPUT"
          fi

  qa:
    needs: check
    if: needs.check.outputs.run_qa == 'true'
    name: Run TCs against petal-1.1 Environment + publish to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: gcloud auth print-access-token > /dev/null

      - name: Run QA (29 TCs)
        id: qa_run
        continue-on-error: true
        run: python qap/test_qa_playbooks.py --runs ${{ inputs.runs || '1' }} --agent ${{ inputs.agent || '1.1' }}

      - name: Upload reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports-${{ github.run_id }}
          path: reports/
          if-no-files-found: warn
          retention-days: 30

      - name: Prepare timestamped report for GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        env:
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          STAMP=$(date -u +%Y%m%d_%H%M%S)
          echo "STAMP=${STAMP}" >> "$GITHUB_ENV"

          mkdir -p gh_publish/${STAMP}
          cp -r reports/* gh_publish/${STAMP}/ 2>/dev/null || true

          SUMMARY=$(grep -h "Total:" reports/*.txt 2>/dev/null | head -1 || echo "—")
          SHORT=${SHA:0:7}

          curl -sfL "https://raw.githubusercontent.com/${REPO}/gh-pages/qa/index.html" \
            -o /tmp/old_index.html 2>/dev/null || true

          python3 - "$STAMP" "$SHORT" "$SUMMARY" /tmp/old_index.html gh_publish/index.html <<'PYEOF'
          import sys, os, html as h

          stamp, sha, summary, old_path, out_path = sys.argv[1:6]
          summary = h.escape(summary)

          # Link directo al HTML del run (no a la carpeta, que no tiene index.html → 404)
          new_row = f'<tr><td>{stamp}</td><td><code>{sha}</code></td><td>{summary}</td><td><a href="{stamp}/qa_latest.html">Ver</a></td></tr>'

          if os.path.exists(old_path) and os.path.getsize(old_path) > 0:
              with open(old_path) as f:
                  content = f.read()
              # Insertar nueva fila DESPUÉS del placeholder → siempre arriba (orden DESC, más reciente primero)
              content = content.replace('<!-- RUNS -->', '<!-- RUNS -->\n' + new_row)
          else:
              content = f"""<!DOCTYPE html>
          <html lang="es"><head><meta charset="utf-8"><title>Petal QA</title>
          <style>
          body {{ font-family: system-ui, sans-serif; max-width: 900px; margin: 2em auto; padding: 0 1em; }}
          h1 {{ color: #2d5016; }}
          table {{ border-collapse: collapse; width: 100%; }}
          th, td {{ border: 1px solid #ddd; padding: 8px 12px; text-align: left; }}
          tr:nth-child(even) {{ background: #f9f9f9; }}
          th {{ background: #4a7c59; color: #fff; }}
          a {{ color: #2d7d46; }}
          code {{ background: #f0f0f0; padding: 2px 6px; border-radius: 3px; }}
          </style></head><body>
          <h1>Petal QA — Historico de runs</h1>
          <table><thead><tr><th>Fecha (UTC)</th><th>Commit</th><th>Resultado</th><th>Reporte</th></tr></thead>
          <tbody>
          <!-- RUNS -->
          {new_row}
          </tbody></table></body></html>"""

          with open(out_path, 'w') as f:
              f.write(content)
          PYEOF

      - name: Build history.json for dashboard
        if: always() && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 qap/rebuild_history.py \
            --include-local "${STAMP}" "gh_publish/${STAMP}/qa_latest.meta.json" \
            --out "gh_publish/history.json"

      - name: Publish reports to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh_publish
          destination_dir: qa
          keep_files: true
          commit_message: "qa: reporte ${{ env.STAMP }} (${{ github.sha }})"
