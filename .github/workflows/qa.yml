# Sprint 4, Task 4 — QA automatica con Promptfoo.
#
# IMPORTANTE: este workflow NO se ejecutara hasta que la Fase B del
# Sprint 4 este completa (WIF configurado en GCP + Variables en GitHub).
# Ver `docs/setup-cicd.md`.
#
# Decisiones tecnicas (Sprint 4):
#   - Trigger: push a feature/* + pull_request a main.
#   - cancel-in-progress: true (si llega push nuevo, cancelar QA en curso).
#   - Promptfoo se ejecuta contra Default Environment (NO Production)
#     para no afectar usuarios reales. detectIntent del Default Env
#     equivale al estado "draft" del agente.
#   - WIF para auth a GCP, igual que deploy.yml.
#
# Trigger: push a feature/* o PR a main.
name: QA Promptfoo

on:
  push:
    branches: ['feature/**']
  pull_request:
    branches: [main]

# Concurrencia 1 por rama. cancel-in-progress=true: cortar QA en curso si
# llega un push nuevo (las QA son lentas; mejor cancelar la stale).
concurrency:
  group: qa-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write   # CRITICO: WIF requiere id-token writable

jobs:
  qa:
    name: Run Promptfoo eval against Default Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Install Promptfoo
        run: npm install -g promptfoo

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify auth
        run: gcloud auth print-access-token > /dev/null

      - name: Run Promptfoo eval
        working-directory: qa
        env:
          PROMPTFOO_PYTHON: ../.venv/bin/python
        run: promptfoo eval
