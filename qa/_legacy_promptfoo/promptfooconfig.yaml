description: "Suite QA minima contra Dialogflow CX (Sprint 1)."

prompts:
  - "{{message}}"

providers:
  - id: file://promptfoo_provider.py
    label: cx-detect-intent
    config:
      language_code: es

tests:
  - description: "Saludo simple — el agente responde algo no vacio"
    vars:
      message: "hola"
    assert:
      - type: javascript
        value: "typeof output === 'string' && output.trim().length > 0"
